<a
  [routerLink]="['/Journal', 'Edit', journal.id]"
  class="p-5 bg-white border border-gray-200 rounded-lg shadow hover:bg-gray-100 block"
>
  <div class="flex justify-between items-center mb-3">
    <h4 class="text-lg lg:text-2xl font-bold tracking-tight text-gray-900 me-3">
      {{ journal.detail }}
    </h4>
    <div>
      <div
        class="amount flex items-center text-2xl lg:text-3xl overflow-hidden"
        [ngClass]="journalStyle.color"
      >
        <h1 class="me-2">{{ journal.amount }}</h1>
        <i [class]="journalStyle.icon"></i>
      </div>
    </div>
  </div>
  <div
    class="text-gray-500 font-medium max-w-full text-xs lg:text-base flex flex-col lg:flex-row"
  >
    <p class="overflow-hidden text-nowrap text-ellipsis me-2">
      <span class="mb-2">
        <i class="fa-solid fa-paperclip"></i>
        {{ journal.notes }}
      </span>
      <span> #{{ journal.code }}</span>
    </p>
    <p class="overflow-hidden text-nowrap text-ellipsis lg:mt-0 mt-2">
      <span>
        <i class="fa-regular fa-clock"></i>
        {{ journal.createdAt }}
      </span>
      <span> | P-{{ journal.periodId }}</span>
    </p>
  </div>
  @if (journal.costCenters?.length) {
    <div class="mt-2 flex flex-wrap gap-1">
      @for (costCenter of journal.costCenters; track costCenter) {
        <span
          class="inline-flex items-center rounded-xl bg-slate-300 px-2.5 py-0.5 text-xs font-medium text-slate-700"
        >
          {{ costCenter }}
        </span>
      }
    </div>
  }
</a>
