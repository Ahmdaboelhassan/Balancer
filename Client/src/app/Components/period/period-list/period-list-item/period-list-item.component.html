<a
  [routerLink]="['/Period', 'PeriodJournals', item?.id]"
  class="block p-5 bg-white border border-gray-200 rounded-lg shadow hover:bg-gray-100"
>
  <h4 class="mb-2 text-lg lg:text-2xl font-bold tracking-tight text-gray-900">
    <a [routerLink]="['/Period', 'Edit', item?.id]">
      <i
        class="fa-regular fa-calendar me-2"
        [ngClass]="item?.increasedBalance ? 'text-green-500' : 'text-red-500'"
      ></i>
      {{ item?.name }}
    </a>
  </h4>
  <h6
    class="text-md lg:text-xl font-bold tracking-tight text-gray-500 flex items-center gap-2"
  >
    <i class="fa-regular fa-clock text-gray-400"></i>

    <span>{{ item?.from }}</span>

    <i class="fa-solid fa-arrow-right text-gray-400"></i>

    <span>{{ item?.to }}</span>
  </h6>

  <div class="p-1 flex justify-start md:justify-end items-end">
    @if (item?.periodBudget) {
      <span
        class="flex items-center gap-3 md:text-2xl text-md font-medium flex-wrap"
      >
        <!-- Budget -->
        <span class="text-blue-600 me-3">
          <i class="fa-solid fa-wallet text-blue-500"></i>
          {{ item?.periodBudget }}
        </span>

        <!-- Total Amount -->

        <span
          class="me-3"
          [ngClass]="{
            'text-green-600': item?.totalAmount >= 0,
            'text-red-600 font-semibold': item?.totalAmount < 0,
          }"
        >
          <i
            class="fa-solid fa-coins"
            [ngClass]="{
              'text-green-500': item?.totalAmount >= 0,
              'text-red-500': item?.totalAmount < 0,
            }"
          ></i>
          {{ item?.totalAmount }}
        </span>

        <!-- Remaining -->

        <span
          [ngClass]="{
            'text-green-600': item?.remains >= 0,
            'text-red-600': item?.remains < 0,
          }"
        >
          <i
            class="fa-solid fa-chart-line"
            [ngClass]="{
              'text-green-600': item?.remains >= 0,
              'text-red-600': item?.remains < 0,
            }"
          ></i>
          {{ item?.remains }}
        </span>
      </span>
    } @else {
      <span class="flex items-center">
        @if (item?.increasedBalance) {
          <span class="text-green-500 text-3xl font-bold me-2">
            {{ item?.totalAmount }}
          </span>
          <i class="fa-solid fa-square-plus text-green-500 text-3xl"></i>
        } @else {
          <span class="text-red-500 text-3xl font-bold me-2">
            {{ item?.totalAmount }}
          </span>
          <i class="fa-solid fa-square-minus text-red-500 text-3xl"></i>
        }
      </span>
    }
  </div>
</a>
